name: Deployment
on:
  push:
    branches:
      - main
      - dev
env:
  MONGODB_DB_NAME: gha-demo
jobs:
  test:
    environment: testing # specifies that, for the 'test' job, we'll be using the 'testing' environment
    env:
      MONGODB_CLUSTER_ADDRESS: cluster0.ihl8xeb.mongodb.net
      MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }} # Because we specified in line #11 (within the scope of the 'test' job) that the environment is 'testing', MONGODB_USERNAME will refer to the ENVIRONMENT variable for the TESTING environment specifically!!
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }} # Because we specified in line #11 (within the scope of the 'test' job) that the environment is 'testing', MONGODB_PASSWORD will refer to the ENVIRONMENT variable for the TESTING environment specifically!!
      PORT: 8080
    # environment: testing 
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: |
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "..."
